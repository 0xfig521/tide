version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: tide
    binary: tide
    ldflags:
      - -s -w
      - -X github.com/0xfig-labs/tide/cmd.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: tar.gz
    name_template: "{{ .Binary }}-{{ .Os }}-{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: 0xfig-labs
    name: tide

brews:
  - name: tide
    repository:
      owner: 0xfig-labs
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: tide-bot
      email: bot@0xfig-labs.dev
    homepage: "https://github.com/0xfig-labs/tide"
    description: "High-speed RSS reader for the terminal"
    license: "MIT"
    directory: Formula
    install: |
      bin.install "tide"
    test: |
      system "#{bin}/tide", "--help"
